  orientation_target_final_tolerance: 0.02
  translation_gradient_weight: 0.8
  orientation_gradient_weight: 0.15
  nn_translation_distance_weight: 0.7
  nn_orientation_distance_weight: 0.15
  task_space_exploitation_fraction: 0.5
